[broker]
bind_addr = "0.0.0.0"
port = 1883

[mqtt]
topic_prefix = "uagv"
tick_hz = 1.0

# The track layout lives in a LIF file (VDMA Layout Interchange Format), so
# layouts exported by a vehicle integrator load without conversion.
#
# 10-node warehouse grid: two parallel aisles connected at each end
#
#  N01 --E01-- N02 --E02-- N03 --E03-- N04 --E04-- N05
#   |                                               |
#  E09                                             E10
#   |                                               |
#  N06 --E05-- N07 --E06-- N08 --E07-- N09 --E08-- N10

[map]
# Path is relative to this config file.
file = "warehouse.lif"
# LIF scopes speed, orientation, and traversability per vehicle type. Nodes and
# edges without an entry for this type are excluded from the simulated graph.
vehicle_type_id = "sim-agv"
layout_id = "warehouse"

# Fleet: 3 scripted + 2 random walkers
[[fleet]]
serial = "AGV-001"
scenario = "scripted"
route = ["N01", "N02", "N03", "N04", "N05", "N10", "N09", "N08", "N07", "N06", "N01"]
speed_m_s = 1.2
loop = true

[[fleet]]
serial = "AGV-002"
scenario = "scripted"
route = ["N06", "N07", "N08", "N09", "N10", "N05", "N04", "N03", "N02", "N01", "N06"]
speed_m_s = 1.0
loop = true

[[fleet]]
serial = "AGV-003"
scenario = "scripted"
route = ["N03", "N04", "N05", "N10", "N09", "N08", "N03"]
speed_m_s = 1.4
loop = true

[[fleet]]
serial = "AGV-004"
scenario = "random_walk"
start_node = "N02"
speed_m_s = 0.9

[[fleet]]
serial = "AGV-005"
scenario = "random_walk"
start_node = "N08"
speed_m_s = 1.1
